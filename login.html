<!DOCTYPE html>
<html lang="en-GB" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join — Python Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
                            300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
                            600: '#4f46e5', 700: '#4338ca', 800: '#3730a3',
                            900: '#312e81', 950: '#1e1b4b',
                        },
                    },
                },
            },
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/platform.css">
    <link rel="stylesheet" href="css/gamification.css">
</head>
<body class="h-full bg-slate-50 text-slate-900 font-sans antialiased flex items-center justify-center">

    <div class="w-full max-w-md mx-auto px-4">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-600 text-white font-mono font-bold text-2xl shadow-lg mb-4">
                Py
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">Python Lab</h1>
            <p class="text-sm text-slate-500 mt-1">Interactive Python Learning</p>
        </div>

        <!-- Login card -->
        <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
            <h2 class="text-lg font-bold text-slate-900 mb-1">Join your class</h2>
            <p class="text-sm text-slate-500 mb-5">Enter your name and the class code your teacher gave you.</p>

            <form id="login-form" class="space-y-4">
                <div>
                    <label for="nickname" class="block text-sm font-medium text-slate-700 mb-1">Your name</label>
                    <input id="nickname" type="text" maxlength="20" required autocomplete="off"
                        placeholder="e.g. Alex"
                        class="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-sm focus:border-brand-400 focus:ring-2 focus:ring-brand-400/20 outline-none transition-all">
                </div>

                <div>
                    <label for="class-code" class="block text-sm font-medium text-slate-700 mb-1">Class code</label>
                    <input id="class-code" type="text" maxlength="10" required autocomplete="off"
                        placeholder="e.g. 7A-CS"
                        class="w-full rounded-xl border border-slate-200 px-4 py-2.5 text-sm font-mono uppercase focus:border-brand-400 focus:ring-2 focus:ring-brand-400/20 outline-none transition-all">
                    <p class="text-xs text-slate-400 mt-1">Ask your teacher for this code.</p>
                </div>

                <div id="error-msg" class="hidden text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2"></div>

                <button type="submit"
                    class="w-full rounded-xl bg-gradient-to-r from-brand-600 to-brand-700 px-4 py-2.5 text-sm font-semibold text-white shadow-sm shadow-brand-600/25 transition-all hover:from-brand-700 hover:to-brand-800 active:scale-[0.98]">
                    Start Learning
                </button>
            </form>
        </div>

        <!-- Skip option -->
        <p class="text-center mt-4">
            <a href="index.html" class="text-xs text-slate-400 hover:text-slate-600 transition-colors">
                Continue without joining a class
            </a>
        </p>
    </div>

    <!-- Firebase SDK (from CDN) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script src="js/gamification.js"></script>
    <script src="js/firebase-sync.js"></script>

    <script>
    (function () {
        // If already logged in, redirect to home
        if (FirebaseSync.isLoggedIn()) {
            window.location.href = "index.html";
            return;
        }

        var form = document.getElementById("login-form");
        var errorMsg = document.getElementById("error-msg");

        form.addEventListener("submit", function (e) {
            e.preventDefault();
            errorMsg.classList.add("hidden");

            var nickname = document.getElementById("nickname").value.trim();
            var classCode = document.getElementById("class-code").value.trim();

            if (!nickname) {
                errorMsg.textContent = "Please enter your name.";
                errorMsg.classList.remove("hidden");
                return;
            }
            if (!classCode) {
                errorMsg.textContent = "Please enter your class code.";
                errorMsg.classList.remove("hidden");
                return;
            }
            if (classCode.length < 2) {
                errorMsg.textContent = "That class code looks too short. Check with your teacher.";
                errorMsg.classList.remove("hidden");
                return;
            }

            // Log in
            var success = FirebaseSync.login(nickname, classCode);
            if (success) {
                window.location.href = "index.html";
            } else {
                errorMsg.textContent = "Something went wrong. Please try again.";
                errorMsg.classList.remove("hidden");
            }
        });
    })();
    </script>
</body>
</html>
