<!DOCTYPE html>
<html lang="en-GB" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topics — Python Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
                            300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
                            600: '#4f46e5', 700: '#4338ca', 800: '#3730a3',
                            900: '#312e81', 950: '#1e1b4b',
                        },
                    },
                },
            },
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/platform.css">
    <link rel="stylesheet" href="css/gamification.css">
</head>
<body class="h-full bg-slate-50 text-slate-900 font-sans antialiased">

    <!-- Header -->
    <header class="border-b border-slate-200 bg-white/80 backdrop-blur-lg sticky top-0 z-50">
        <div class="mx-auto max-w-5xl px-4 sm:px-6 lg:px-8">
            <div class="flex h-14 items-center justify-between">
                <a href="index.html" class="flex items-center gap-2.5">
                    <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 text-white font-mono font-bold text-sm shadow-sm">
                        Py
                    </div>
                    <span class="text-lg font-semibold tracking-tight">Python Lab</span>
                </a>
                <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-brand-600 transition-colors flex items-center gap-1">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
                    </svg>
                    All Year Groups
                </a>
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-5xl px-4 sm:px-6 lg:px-8 py-10">

        <!-- Year heading (filled by JS) -->
        <div class="mb-8">
            <h1 id="year-title" class="text-2xl font-bold tracking-tight text-slate-900"></h1>
            <p id="year-subtitle" class="mt-1 text-sm text-slate-500"></p>
        </div>

        <!-- Topic cards container -->
        <div id="topic-list" class="space-y-5">
            <!-- Filled by JS -->
        </div>

        <!-- Empty state -->
        <div id="empty-state" class="hidden text-center py-16">
            <p class="text-slate-400 text-sm">No topics found for this year group.</p>
            <a href="index.html" class="mt-4 inline-block text-sm font-medium text-brand-600 hover:text-brand-700">Go back</a>
        </div>

    </main>

    <footer class="border-t border-slate-200 mt-auto">
        <div class="mx-auto max-w-5xl px-4 sm:px-6 lg:px-8 py-6">
            <p class="text-center text-sm text-slate-400">Python Lab — Part of the Kirsty Class Planner</p>
        </div>
    </footer>

    <script src="data/exercises.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/gamification.js"></script>
    <script>
    (function () {
        // Get year from query string
        var params = new URLSearchParams(window.location.search);
        var yearKey = params.get("year") || "7";
        var yearData = EXERCISES[yearKey];

        if (!yearData) {
            document.getElementById("empty-state").classList.remove("hidden");
            document.getElementById("year-title").textContent = "Year Group Not Found";
            return;
        }

        // Colour mapping for Tailwind classes
        var colourMap = {
            emerald: { bg: "bg-emerald-50", text: "text-emerald-600", border: "border-emerald-200", barBg: "bg-emerald-500", hoverBorder: "hover:border-emerald-300", ring: "ring-emerald-500/20" },
            blue:    { bg: "bg-blue-50",    text: "text-blue-600",    border: "border-blue-200",    barBg: "bg-blue-500",    hoverBorder: "hover:border-blue-300",    ring: "ring-blue-500/20" },
            violet:  { bg: "bg-violet-50",  text: "text-violet-600",  border: "border-violet-200",  barBg: "bg-violet-500",  hoverBorder: "hover:border-violet-300",  ring: "ring-violet-500/20" },
            amber:   { bg: "bg-amber-50",   text: "text-amber-600",   border: "border-amber-200",   barBg: "bg-amber-500",   hoverBorder: "hover:border-amber-300",   ring: "ring-amber-500/20" }
        };
        var c = colourMap[yearData.colour] || colourMap.emerald;

        // Icon SVGs
        var icons = {
            wave:   '<path stroke-linecap="round" stroke-linejoin="round" d="M10.05 4.575a1.575 1.575 0 1 0-3.15 0v3m3.15-3v-1.5a1.575 1.575 0 0 1 3.15 0v1.5m-3.15 0 .075 5.925m3.075-5.925v3.075M14.25 6.075a1.575 1.575 0 0 1 1.575 1.575v1.575M14.25 6.075V4.575a1.575 1.575 0 0 1 3.15 0V6M14.25 6.075v1.575m3.15-3.15v3.075a1.575 1.575 0 0 0 1.575 1.575h.15" />',
            box:    '<path stroke-linecap="round" stroke-linejoin="round" d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5m8.25 3v6.75m0 0-3-3m3 3 3-3M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" />',
            chat:   '<path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 0 1 .865-.501 48.172 48.172 0 0 0 3.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" />',
            fork:   '<path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 1 0 0 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186 9.566-5.314m-9.566 7.5 9.566 5.314m0 0a2.25 2.25 0 1 0 3.935 2.186 2.25 2.25 0 0 0-3.935-2.186Zm0-12.814a2.25 2.25 0 1 0 3.933-2.185 2.25 2.25 0 0 0-3.933 2.185Z" />',
            repeat: '<path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182" />',
            puzzle: '<path stroke-linecap="round" stroke-linejoin="round" d="M14.25 6.087c0-.355.186-.676.401-.959.221-.29.349-.634.349-1.003 0-1.036-1.007-1.875-2.25-1.875s-2.25.84-2.25 1.875c0 .369.128.713.349 1.003.215.283.401.604.401.959v0a.64.64 0 0 1-.657.643 48.421 48.421 0 0 1-4.185-.194M14.25 6.087c0 .662.196 1.308.476 1.898M14.25 6.087l.459-.792M6.058 12.506a48.357 48.357 0 0 0-.194-4.185.64.64 0 0 1 .643-.657c.355 0 .676.186.959.401.29.221.634.349 1.003.349 1.036 0 1.875-1.007 1.875-2.25S9.505 3.914 8.469 3.914c-.369 0-.713.128-1.003.349-.283.215-.604.401-.959.401v0a.64.64 0 0 1-.643-.657 48.421 48.421 0 0 1 .194-4.185" />',
            list:   '<path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0ZM3.75 12h.007v.008H3.75V12Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm-.375 5.25h.007v.008H3.75v-.008Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />',
            shield: '<path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z" />',
            file:   '<path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />'
        };

        // PRIMM type badge classes
        var primmClasses = {
            predict:     "primm-badge primm-predict",
            run:         "primm-badge primm-run",
            investigate: "primm-badge primm-investigate",
            modify:      "primm-badge primm-modify",
            make:        "primm-badge primm-make"
        };
        var primmLabels = {
            predict: "Predict", run: "Run", investigate: "Investigate", modify: "Modify", make: "Make"
        };

        // Set page heading
        document.getElementById("year-title").textContent = yearData.label + " — Topics";
        document.getElementById("year-subtitle").textContent =
            "Choose a topic to start practising. Work through exercises in order — they build on each other.";
        document.title = yearData.label + " Topics — Python Lab";

        var container = document.getElementById("topic-list");
        var topics = yearData.topics || [];

        if (topics.length === 0) {
            document.getElementById("empty-state").classList.remove("hidden");
            return;
        }

        for (var t = 0; t < topics.length; t++) {
            var topic = topics[t];
            var stats = (typeof Gamification !== "undefined" ? Gamification : Progress).countForTopic(yearKey, topic.id);
            var pct = stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0;
            var iconSvg = icons[topic.icon] || icons.list;

            // Build exercise list HTML
            var exListHtml = "";
            for (var e = 0; e < topic.exercises.length; e++) {
                var ex = topic.exercises[e];
                var done = (typeof Gamification !== "undefined" ? Gamification.isExerciseComplete(ex.id) : Progress.isComplete(ex.id));
                var doneClass = done ? "exercise-complete" : "";
                var doneIcon = done
                    ? '<svg class="h-4 w-4 text-emerald-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd"/></svg>'
                    : '<span class="flex h-4 w-4 items-center justify-center rounded-full border border-slate-300 text-[10px] text-slate-400 flex-shrink-0">' + (e + 1) + '</span>';

                exListHtml +=
                    '<a href="exercise.html?year=' + yearKey + '&topic=' + topic.id + '&ex=' + ex.id + '"' +
                    '   class="flex items-center gap-3 rounded-lg px-3 py-2.5 transition-colors hover:bg-slate-50 ' + doneClass + '">' +
                        doneIcon +
                        '<span class="flex-1 text-sm text-slate-700">' + ex.title + '</span>' +
                        '<span class="' + (primmClasses[ex.type] || '') + '">' + (primmLabels[ex.type] || ex.type) + '</span>' +
                    '</a>';
            }

            // Topic card
            var cardHtml =
                '<div class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden transition-all ' + c.hoverBorder + '">' +
                    '<div class="p-6 flex items-start gap-4">' +
                        '<div class="flex h-11 w-11 items-center justify-center rounded-xl ' + c.bg + ' ' + c.text + ' flex-shrink-0">' +
                            '<svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">' + iconSvg + '</svg>' +
                        '</div>' +
                        '<div class="flex-1 min-w-0">' +
                            '<h2 class="text-lg font-semibold text-slate-900">' + topic.title + '</h2>' +
                            '<p class="text-sm text-slate-500 mt-0.5">' + topic.description + '</p>' +
                            '<div class="flex items-center gap-3 mt-3">' +
                                '<div class="h-1.5 flex-1 rounded-full bg-slate-100 overflow-hidden">' +
                                    '<div class="h-full rounded-full ' + c.barBg + ' transition-all" style="width: ' + pct + '%"></div>' +
                                '</div>' +
                                '<span class="text-xs font-medium text-slate-400 whitespace-nowrap">' + stats.done + ' / ' + stats.total + '</span>' +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="border-t border-slate-100 divide-y divide-slate-100 px-3 py-1">' +
                        exListHtml +
                    '</div>' +
                '</div>';

            container.insertAdjacentHTML("beforeend", cardHtml);
        }
    })();
    </script>
</body>
</html>
